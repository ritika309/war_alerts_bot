name: UAE Monitor

on:
  schedule:
    - cron: "0 4-18 * * *"   # every 30 minutes
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py

      - name: Commit seen_articles.json if changed
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add seen_articles.json || true
          git diff --cached --quiet || git commit -m "Update seen articles"
          git push
